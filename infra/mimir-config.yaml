multitenancy_enabled: false

server:
  http_listen_port: 9009

common:
  storage:
    backend: filesystem
    filesystem:
      dir: /data/mimir

blocks_storage:
  backend: filesystem
  filesystem:
    dir: /data/mimir/blocks
  tsdb:
    dir: /data/mimir/tsdb

ruler:
  rule_path: /data/mimir/ruler-data
  enable_api: true
  alertmanager_url: http://localhost:9009/alertmanager

ruler_storage:
  backend: filesystem
  filesystem:
    dir: /data/mimir/rules

ingester:
  ring:
    replication_factor: 1
