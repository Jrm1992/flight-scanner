name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    name: Deploy to homeserver
    runs-on: self-hosted
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4

      - name: Build and deploy
        run: |
          docker compose up --build -d
          docker image prune -f

      - name: Health check
        run: |
          sleep 5
          curl -sf http://localhost/health || (docker compose logs --tail=20 && exit 1)
